version: "3"
services:
  postgres:
    image: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_node -d mi_base_datos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ttracker-api:
    image: node:20-alpine
    volumes:
      - ./tests-tracker-api/:/usr/src/app
    working_dir: /usr/src/app
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: